<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 384px;
  height: 216px;
  overflow: hidden;
  background: transparent;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

.fc { position: absolute; width: 20px; height: 20px; }
.fc::before, .fc::after { content: ''; position: absolute; background: #cc0000; }
.fc::before { width: 100%; height: 2.5px; }
.fc::after  { width: 2.5px; height: 100%; }
.tl { top: 0; left: 0; }
.tr { top: 0; right: 0; transform: scaleX(-1); }
.bl { bottom: 0; left: 0; transform: scaleY(-1); }
.br { bottom: 0; right: 0; transform: scale(-1); }

.ftop { position: absolute; top: 0; left: 0; right: 0; height: 2.5px; background: #cc0000; }

.hud { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.htime { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: #fff; letter-spacing: .1em; line-height: 1; text-shadow: 0 1px 4px rgba(0,0,0,.9); }
.hrow { display: flex; align-items: center; gap: 5px; }
.hres { font-family: 'DM Mono', monospace; font-size: 9px; color: #ccc; letter-spacing: .1em; text-transform: uppercase; text-shadow: 0 1px 3px rgba(0,0,0,.9); }
.hbadge { background: #cc0000; color: #fff; font-family: 'DM Mono', monospace; font-size: 8px; font-weight: 700; padding: 2px 7px; letter-spacing: .12em; display: flex; align-items: center; gap: 4px; }
.hbdot { width: 5px; height: 5px; background: #fff; border-radius: 50%; animation: blnk 1s steps(2) infinite; }

.ticker { position: absolute; bottom: 30px; left: 0; right: 0; height: 18px; display: flex; overflow: hidden; }
.ttag { background: #cc0000; color: #fff; font-family: 'DM Mono', monospace; font-size: 7px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 0 8px; display: flex; align-items: center; gap: 4px; flex-shrink: 0; z-index: 2; }
.tdot { width: 3px; height: 3px; background: #fff; border-radius: 50%; animation: blnk 1s steps(2) infinite; }
#tr {
  flex: 1;
  background: rgba(8,8,8,.92);
  border-top: 1.5px solid #cc0000;
  position: relative;
  overflow: hidden;
}

.social-group {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 14px;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.social-group.active { opacity: 1; }
.social-entry { display: inline-flex; align-items: center; gap: 5px; }
.social-icon {
  width: 12px; height: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 2px; font-size: 7px; flex-shrink: 0;
}
.social-handle { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 600; color: #fff; }
.social-sep { color: #444; font-size: 9px; }

.icon-twitch    { background: #9146ff; color: #fff; }
.icon-tiktok    { background: #010101; color: #fff; }
.icon-youtube   { background: #ff0000; color: #fff; }
.icon-instagram { background: #e1306c; color: #fff; }
.icon-discord   { background: #5865f2; color: #fff; }
.icon-twitter   { background: #000;    color: #fff; }

.badge { position: absolute; bottom: 0; left: 0; right: 0; height: 30px; display: flex; align-items: stretch; }
.btag { background: #cc0000; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700; padding: 0 10px; display: flex; align-items: center; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; flex-shrink: 0; }
.bname { flex: 1; background: rgba(10,10,10,.95); display: flex; flex-direction: column; justify-content: center; padding: 0 10px; min-width: 0; }
.bnm { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: #fff; line-height: 1.1; letter-spacing: .01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btt { font-family: 'DM Mono', monospace; font-size: 7px; color: #555; letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bright { background: rgba(10,10,10,.95); display: flex; align-items: center; gap: 6px; padding: 0 10px; flex-shrink: 0; border-left: 1px solid #2a2a2a; }
.bdot { width: 6px; height: 6px; border-radius: 50%; background: #cc0000; animation: blnk 1s steps(2) infinite; box-shadow: 0 0 4px 1px rgba(204,0,0,.5); }
.boa { font-family: 'DM Mono', monospace; font-size: 7px; font-weight: 600; color: #fff; letter-spacing: .14em; text-transform: uppercase; white-space: nowrap; }

.scan {
  position: absolute; left: 0; right: 0; height: 1px;
  background: rgba(255,255,255,.04);
  will-change: transform;
  animation: sc 5s linear infinite;
  pointer-events: none;
}

@keyframes blnk { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes sc   { 0%{transform:translateY(0)} 100%{transform:translateY(216px)} }
</style>
</head>
<body>

<div class="scan"></div>
<div class="fc tl"></div>
<div class="fc tr"></div>
<div class="fc bl"></div>
<div class="fc br"></div>
<div class="ftop"></div>

<div class="hud">
  <div class="htime" id="ht">00:00:00</div>
  <div class="hrow">
    <div class="hres">1080p</div>
    <div class="hbadge"><div class="hbdot"></div>LIVE</div>
  </div>
</div>

<div class="ticker">
  <div class="ttag"><div class="tdot"></div>RÉSEAUX</div>
  <div id="tr">
    <div class="social-group active">
      <div class="social-entry">
        <span class="social-icon icon-twitch"><i class="fa-brands fa-twitch"></i></span>
        <span class="social-handle">@NasNekkk</span>
      </div>
      <span class="social-sep">·</span>
      <div class="social-entry">
        <span class="social-icon icon-tiktok"><i class="fa-brands fa-tiktok"></i></span>
        <span class="social-handle">@NasNekkk</span>
      </div>
      <span class="social-sep">·</span>
      <div class="social-entry">
        <span class="social-icon icon-youtube"><i class="fa-brands fa-youtube"></i></span>
        <span class="social-handle">@NasNekkk</span>
      </div>
    </div>
    <div class="social-group">
      <div class="social-entry">
        <span class="social-icon icon-instagram"><i class="fa-brands fa-instagram"></i></span>
        <span class="social-handle">@NasNekkk</span>
      </div>
      <span class="social-sep">·</span>
      <div class="social-entry">
        <span class="social-icon icon-discord"><i class="fa-brands fa-discord"></i></span>
        <span class="social-handle">@NasNekkk</span>
      </div>
      <span class="social-sep">·</span>
      <div class="social-entry">
        <span class="social-icon icon-twitter"><i class="fa-brands fa-x-twitter"></i></span>
        <span class="social-handle">@NasNekkk</span>
      </div>
    </div>
  </div>
</div>

<div class="badge">
  <div class="btag">LIVE</div>
  <div class="bname">
    <div class="bnm">NasNekkk</div>
    <div class="btt">Streameur · Gaming</div>
  </div>
  <div class="bright">
    <div class="bdot"></div>
    <div class="boa">On air</div>
  </div>
</div>

<script>
var htEl = document.getElementById('ht');
var lastSec = -1;
function tick() {
  var n = new Date(), s = n.getSeconds();
  if (s !== lastSec) {
    lastSec = s;
    htEl.textContent =
      String(n.getHours()).padStart(2,'0') + ':' +
      String(n.getMinutes()).padStart(2,'0') + ':' +
      String(s).padStart(2,'0');
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

var groups = document.querySelectorAll('.social-group');
var current = 0;
setInterval(function() {
  groups[current].classList.remove('active');
  current = (current + 1) % groups.length;
  groups[current].classList.add('active');
}, 4000);
</script>
</body>
</html>
